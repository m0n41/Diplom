<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Portal — Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
.login-card h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
.login-card p { color: #666; margin-bottom: 24px; font-size: 14px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #333; }
.form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.form-group input:focus { outline: none; border-color: #285c9b; }
.btn { width: 100%; padding: 12px; background: #285c9b; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
.btn:hover { background: #1e4a7d; }
.error { background: #fee; color: #c33; padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
.footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="login-card">
<h1>🔐 Демо-портал</h1>
<p>Демонстрация системы контроля доступа</p>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="post" action="/demo/login">
<div class="form-group">
<label>Имя пользователя</label>
<input type="text" name="username" required autofocus placeholder="ivan">
</div>
<div class="form-group">
<label>Пароль</label>
<input type="password" name="password" required placeholder="test123">
</div>
<button type="submit" class="btn">Войти</button>
</form>
<div class="footer">Система управления доступом RBAC/ABAC</div>
</div>
</body>
</html>
